<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoneyCash · CRM</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#eef3f7;color:#23323d}
  /* LOGIN */
  #login{position:fixed;inset:0;background:linear-gradient(160deg,#0f5980,#0a3f5c);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50}
  .loginbox{background:#fff;border-radius:18px;padding:30px 24px;width:100%;max-width:360px;box-shadow:0 12px 40px rgba(0,0,0,.25)}
  .logo{text-align:center;font-size:1.5em;font-weight:900;color:#0f5980;letter-spacing:-.5px}
  .logosub{text-align:center;font-size:.72em;color:#7d94a3;font-weight:600;margin-bottom:22px}
  .loginbox label{display:block;font-size:.74em;font-weight:700;color:#5a7384;margin:12px 0 5px}
  .loginbox input{width:100%;padding:12px;border:1px solid #d4dee6;border-radius:10px;font-size:.95em}
  .loginbox button{width:100%;margin-top:20px;padding:13px;background:#0f5980;color:#fff;border:none;border-radius:11px;font-weight:800;font-size:.95em;cursor:pointer}
  .loginerr{background:#ffe3e3;color:#c0392b;padding:10px;border-radius:9px;font-size:.8em;font-weight:600;margin-top:14px;display:none}
  /* APP */
  #app{display:none;padding-bottom:72px}
  .topbar{background:#0f5980;color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.12)}
  .topbar .tit{font-size:1.02em;font-weight:800}
  .topbar .sub{font-size:.64em;opacity:.85;font-weight:600;margin-top:2px}
  .ibtn{background:rgba(255,255,255,.18);border:none;color:#fff;font-size:1em;width:36px;height:36px;border-radius:9px;cursor:pointer}
  .ibtn:active{transform:scale(.92)}
  .wrap{max-width:680px;margin:0 auto;padding:14px}
  .vel{background:#d3f9d8;color:#1c7c4a;font-weight:800;font-size:.8em;padding:8px 12px;border-radius:9px;margin-bottom:12px;text-align:center}
  input.f,select{width:100%;padding:11px 12px;border:1px solid #d4dee6;border-radius:10px;font-size:.92em;background:#fff;margin-bottom:8px}
  .filtros{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px}
  .resumen{font-size:.8em;color:#7d94a3;font-weight:700;margin:6px 0 12px}
  .card{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(15,89,128,.07);border-left:4px solid #2fb344}
  .card.liq{border-left-color:#9ab;opacity:.7}
  .card.mora{border-left-color:#e8590c}
  .crow{display:flex;justify-content:space-between;align-items:center}
  .nom{font-weight:700;font-size:.92em}
  .meta{font-size:.71em;color:#7d94a3;margin-top:2px}
  .saldo{font-weight:800;color:#0f5980;font-size:.97em;text-align:right;white-space:nowrap}
  .saldo.r{color:#e8590c}
  .badge{font-size:.57em;font-weight:800;padding:2px 7px;border-radius:6px;display:inline-block;margin-top:3px}
  .badge.act{background:#d3f9d8;color:#2fb344}
  .badge.liq{background:#e7eef3;color:#5a7384}
  .badge.dias{background:#ffe3e3;color:#e8590c}
  .loader{text-align:center;padding:30px;color:#7d94a3;font-weight:600}
  /* KPIs dashboard */
  .kgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
  .kpi{background:#fff;border-radius:14px;padding:16px;box-shadow:0 1px 4px rgba(15,89,128,.07)}
  .kpi .lab{font-size:.66em;color:#9ab;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  .kpi .val{font-size:1.5em;font-weight:900;color:#0f5980;margin-top:4px}
  .kpi.alert .val{color:#e8590c}
  .kpi.full{grid-column:1/3}
  .sech{font-size:.78em;text-transform:uppercase;letter-spacing:1px;color:#7d94a3;font-weight:700;margin:16px 0 8px}
  .ejrow{display:flex;justify-content:space-between;padding:9px 12px;background:#fff;border-radius:9px;margin-bottom:6px;font-size:.85em;box-shadow:0 1px 3px rgba(15,89,128,.05)}
  .ejrow b{color:#e8590c}
  /* NAV */
  .nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e3eaf0;display:flex;z-index:20;box-shadow:0 -2px 10px rgba(0,0,0,.06)}
  .nav button{flex:1;background:none;border:none;padding:9px 0 11px;cursor:pointer;color:#9ab;font-size:.66em;font-weight:700}
  .nav button .ic{font-size:1.5em;display:block;margin-bottom:2px}
  .nav button.on{color:#0f5980}
</style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login">
    <div class="loginbox">
      <div class="logo">MoneyCash</div>
      <div class="logosub">Sistema de cartera</div>
      <label>Correo</label>
      <input type="email" id="email" placeholder="tu@correo.com" autocomplete="username">
      <label>Contraseña</label>
      <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')entrar()">
      <button onclick="entrar()" id="btnEntrar">Entrar</button>
      <div class="loginerr" id="loginerr"></div>
    </div>
  </div>

  <!-- APP -->
  <div id="app">
    <div class="topbar">
      <div><div class="tit" id="ptit">📊 Inicio</div><div class="sub" id="quien">MoneyCash</div></div>
      <div style="display:flex;gap:8px">
        <button class="ibtn" onclick="recargar()" title="Actualizar">🔄</button>
        <button class="ibtn" onclick="salir()" title="Salir">🚪</button>
      </div>
    </div>

    <div class="wrap">
      <div id="vista_inicio"></div>
      <div id="vista_cartera" style="display:none"></div>
      <div id="vista_cobranza" style="display:none"></div>
    </div>

    <div class="nav">
      <button id="nav_inicio" class="on" onclick="ir('inicio')"><span class="ic">📊</span>Inicio</button>
      <button id="nav_cartera" onclick="ir('cartera')"><span class="ic">📋</span>Cartera</button>
      <button id="nav_cobranza" onclick="ir('cobranza')"><span class="ic">💰</span>Cobranza</button>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://qlobqnzgdojghypbdeks.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_YIFdSES9rZJuc8Z70X5riA_Oe9pdXlP';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let CARTERA = [];     // todos los clientes
  let MORA = [];        // [{cliente, ejecutivo, mora, dias}]
  let VISTA = 'inicio';
  const f = n => '$' + Number(n||0).toLocaleString('es-MX', {maximumFractionDigits:0});
  const norm = s => (s||'').toString().trim().toUpperCase();

  // ── arranque ──
  async function init(){
    const { data:{ session } } = await db.auth.getSession();
    if(session){ mostrarApp(session); } else { mostrarLogin(); }
  }
  function mostrarLogin(){ document.getElementById('login').style.display='flex'; document.getElementById('app').style.display='none'; }
  async function mostrarApp(session){
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('quien').textContent = 'MoneyCash · ' + (session.user.email||'');
    await cargarTodo();
  }

  async function entrar(){
    const email=document.getElementById('email').value.trim();
    const pass=document.getElementById('pass').value;
    const eb=document.getElementById('loginerr'), btn=document.getElementById('btnEntrar');
    eb.style.display='none';
    if(!email||!pass){ eb.textContent='Pon tu correo y contraseña.'; eb.style.display='block'; return; }
    btn.textContent='Entrando...'; btn.disabled=true;
    const { data, error } = await db.auth.signInWithPassword({ email, password: pass });
    btn.textContent='Entrar'; btn.disabled=false;
    if(error){ eb.textContent='Correo o contraseña incorrectos.'; eb.style.display='block'; return; }
    document.getElementById('pass').value='';
    mostrarApp(data.session);
  }
  async function salir(){ await db.auth.signOut(); CARTERA=[]; MORA=[]; mostrarLogin(); }

  // ── cargar TODO una vez (cartera + mora), luego cambiar de vista es instantáneo ──
  async function cargarTodo(){
    document.getElementById('vista_inicio').innerHTML='<div class="loader">⏳ Cargando...</div>';
    // 1) Cartera
    const r1 = await db.from('cartera').select('*').order('saldo',{ascending:false});
    CARTERA = r1.data || [];
    // 2) Mora: pagos vencidos (fecha < hoy-3 días) no pagados
    const hoy = new Date();
    const corte = new Date(hoy.getTime() - 3*86400000).toISOString().slice(0,10);
    const r2 = await db.from('calendarios').select('cliente,monto_puntual,monto_impuntual,pagado,fecha,estatus').lt('fecha', corte);
    const pend = (r2.data||[]).filter(p => norm(p.estatus).indexOf('PAGADO') < 0);
    // mapa cliente -> ejecutivo (desde cartera)
    const ejecDe = {}; CARTERA.forEach(c => ejecDe[norm(c.nombre)] = c.ejecutivo || '—');
    const acc = {};
    const hoyMs = new Date(hoy.toISOString().slice(0,10)).getTime();
    pend.forEach(p => {
      const k = norm(p.cliente);
      const falta = Math.max((Number(p.monto_impuntual)||Number(p.monto_puntual)||0) - (Number(p.pagado)||0), 0);
      if(falta <= 0) return;
      if(!acc[k]) acc[k] = { cliente:p.cliente, ejecutivo: ejecDe[k]||'—', mora:0, dias:0 };
      acc[k].mora += falta;
      const dias = Math.floor((hoyMs - new Date(p.fecha).getTime())/86400000);
      if(dias > acc[k].dias) acc[k].dias = dias;
    });
    MORA = Object.values(acc).filter(m=>m.mora>0).sort((a,b)=>b.mora-a.mora);
    pintarTodo();
  }
  function recargar(){ cargarTodo(); }

  // ── navegación instantánea ──
  function ir(v){
    VISTA = v;
    ['inicio','cartera','cobranza'].forEach(x=>{
      document.getElementById('vista_'+x).style.display = (x===v?'block':'none');
      document.getElementById('nav_'+x).className = (x===v?'on':'');
    });
    document.getElementById('ptit').textContent = v==='inicio'?'📊 Inicio':v==='cartera'?'📋 Cartera':'💰 Cobranza';
  }

  function pintarTodo(){ pintarInicio(); pintarCartera(); pintarCobranza(); }

  // ── DASHBOARD ──
  function pintarInicio(){
    const totCart = CARTERA.reduce((s,c)=>s+Number(c.saldo||0),0);
    const conSaldo = CARTERA.filter(c=>Number(c.saldo||0)>0).length;
    const liq = CARTERA.filter(c=>Number(c.saldo||0)<=0).length;
    const totMora = MORA.reduce((s,m)=>s+m.mora,0);
    // mora por ejecutivo
    const porEj = {};
    MORA.forEach(m=>{ porEj[m.ejecutivo]=(porEj[m.ejecutivo]||0)+m.mora; });
    const ejs = Object.entries(porEj).sort((a,b)=>b[1]-a[1]);
    document.getElementById('vista_inicio').innerHTML =
      '<div class="kgrid">'+
        '<div class="kpi"><div class="lab">Cartera total</div><div class="val">'+f(totCart)+'</div></div>'+
        '<div class="kpi alert"><div class="lab">Mora total</div><div class="val">'+f(totMora)+'</div></div>'+
        '<div class="kpi"><div class="lab">Clientes activos</div><div class="val">'+conSaldo+'</div></div>'+
        '<div class="kpi alert"><div class="lab">Clientes en mora</div><div class="val">'+MORA.length+'</div></div>'+
      '</div>'+
      '<div class="sech">Mora por ejecutivo</div>'+
      (ejs.map(([e,v])=>'<div class="ejrow"><span>👤 '+e+'</span><b>'+f(v)+'</b></div>').join('') || '<div class="loader">Sin mora 🎉</div>');
  }

  // ── CARTERA ──
  function pintarCartera(){
    document.getElementById('vista_cartera').innerHTML =
      '<input type="text" class="f" id="bCart" placeholder="🔍 Buscar cliente..." oninput="renderCart()">'+
      '<div class="filtros">'+
        '<select id="ejCart" onchange="renderCart()"><option value="">Todos los ejecutivos</option></select>'+
        '<select id="esCart" onchange="renderCart()"><option value="">Todos</option><option value="ACT">Con saldo</option><option value="LIQ">Liquidados</option></select>'+
      '</div><div class="resumen" id="resCart"></div><div id="listCart"></div>';
    const sel=document.getElementById('ejCart');
    [...new Set(CARTERA.map(c=>c.ejecutivo).filter(Boolean))].sort().forEach(e=>{
      const o=document.createElement('option'); o.value=e; o.textContent=e; sel.appendChild(o);
    });
    renderCart();
  }
  function renderCart(){
    const q=(document.getElementById('bCart').value||'').trim().toLowerCase();
    const fe=document.getElementById('ejCart').value, fes=document.getElementById('esCart').value;
    let l=CARTERA.filter(c=>(c.nombre||'').toLowerCase().includes(q));
    if(fe) l=l.filter(c=>c.ejecutivo===fe);
    if(fes==='ACT') l=l.filter(c=>Number(c.saldo||0)>0);
    if(fes==='LIQ') l=l.filter(c=>Number(c.saldo||0)<=0);
    document.getElementById('resCart').textContent=l.length+' clientes · cartera '+f(l.reduce((s,c)=>s+Number(c.saldo||0),0));
    document.getElementById('listCart').innerHTML=l.map(c=>{
      const liq=Number(c.saldo||0)<=0;
      return '<div class="card'+(liq?' liq':'')+'"><div class="crow"><div style="min-width:0">'+
        '<div class="nom">'+(c.nombre||'')+'</div><div class="meta">👤 '+(c.ejecutivo||'—')+' · '+(c.frecuencia||'—')+' · capital '+f(c.capital)+'</div></div>'+
        '<div><div class="saldo">'+f(c.saldo)+'</div><div style="text-align:right"><span class="badge '+(liq?'liq':'act')+'">'+(liq?'LIQUIDADO':'CON SALDO')+'</span></div></div></div></div>';
    }).join('')||'<div class="loader">Sin resultados</div>';
  }

  // ── COBRANZA (mora) ──
  function pintarCobranza(){
    document.getElementById('vista_cobranza').innerHTML =
      '<input type="text" class="f" id="bCob" placeholder="🔍 Buscar cliente..." oninput="renderCob()">'+
      '<select id="ejCob" onchange="renderCob()" style="margin-bottom:8px"><option value="">Todos los ejecutivos</option></select>'+
      '<div class="resumen" id="resCob"></div><div id="listCob"></div>';
    const sel=document.getElementById('ejCob');
    [...new Set(MORA.map(m=>m.ejecutivo).filter(Boolean))].sort().forEach(e=>{
      const o=document.createElement('option'); o.value=e; o.textContent=e; sel.appendChild(o);
    });
    renderCob();
  }
  function renderCob(){
    const q=(document.getElementById('bCob').value||'').trim().toLowerCase();
    const fe=document.getElementById('ejCob').value;
    let l=MORA.filter(m=>(m.cliente||'').toLowerCase().includes(q));
    if(fe) l=l.filter(m=>m.ejecutivo===fe);
    document.getElementById('resCob').textContent=l.length+' en mora · total '+f(l.reduce((s,m)=>s+m.mora,0));
    document.getElementById('listCob').innerHTML=l.map(m=>
      '<div class="card mora"><div class="crow"><div style="min-width:0">'+
      '<div class="nom">'+(m.cliente||'')+'</div><div class="meta">👤 '+(m.ejecutivo||'—')+'</div></div>'+
      '<div><div class="saldo r">'+f(m.mora)+'</div><div style="text-align:right"><span class="badge dias">'+m.dias+' días</span></div></div></div></div>'
    ).join('')||'<div class="loader">Nadie en mora 🎉</div>';
  }

  init();
</script>
</body>
</html>
