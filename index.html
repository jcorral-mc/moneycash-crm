<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoneyCash · CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0A1F33; --navy:#103A63; --steel:#2E6FB0; --gold:#C9A227;
    --bg:#EEF2F6; --card:#FFFFFF; --line:#E2E9F1; --slate:#6A7F92; --ink2:#16242F;
    --green:#1E7A52; --amber:#B9791C; --red:#C0392B;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--ink2);-webkit-font-smoothing:antialiased}
  .num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}

  /* LOGIN */
  #login{position:fixed;inset:0;background:linear-gradient(165deg,var(--ink),var(--navy) 70%,#0c2a47);display:flex;align-items:center;justify-content:center;padding:22px;z-index:50}
  .loginbox{background:#fff;border-radius:18px;padding:32px 26px;width:100%;max-width:370px;box-shadow:0 18px 50px rgba(0,0,0,.30)}
  .lmark{width:46px;height:46px;border-radius:11px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--ink);font-size:1.3em;margin:0 auto 14px}
  .logo{text-align:center;font-weight:600;letter-spacing:.14em;font-size:1.05em;color:var(--navy)}
  .logo b{font-weight:700}
  .logosub{text-align:center;font-size:.72em;color:var(--slate);font-weight:500;margin:4px 0 24px}
  .loginbox label{display:block;font-size:.7em;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--slate);margin:14px 0 6px}
  .loginbox input{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:10px;font-size:.95em;font-family:inherit;background:#fafcfe}
  .loginbox input:focus{outline:none;border-color:var(--steel)}
  .loginbox button{width:100%;margin-top:22px;padding:13px;background:var(--navy);color:#fff;border:none;border-radius:11px;font-weight:600;font-size:.95em;cursor:pointer;font-family:inherit;letter-spacing:.02em}
  .loginbox button:active{transform:scale(.99)}
  .loginerr{background:#FBEAE7;color:var(--red);padding:11px;border-radius:9px;font-size:.8em;font-weight:500;margin-top:14px;display:none}

  /* HEADER */
  #app{display:none;padding-bottom:80px}
  .hdr{background:linear-gradient(180deg,var(--ink),var(--navy));color:#fff;padding:15px 18px 17px;position:sticky;top:0;z-index:10}
  .hdr .top{display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:9px}
  .brand .mark{width:30px;height:30px;border-radius:7px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--ink)}
  .brand .wm{font-weight:600;letter-spacing:.14em;font-size:.9em}
  .hicons{display:flex;gap:6px}
  .hbtn{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.10);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .hbtn:active{transform:scale(.94)}
  .hello{margin-top:13px;display:flex;align-items:flex-end;justify-content:space-between}
  .hello .g{font-size:1.16em;font-weight:600}
  .hello .sub{font-size:.71em;color:#9fb8cf;margin-top:2px}

  .wrap{max-width:680px;margin:0 auto;padding:16px 16px 0}
  .ptit{display:none}

  /* KPI */
  .kbig{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px}
  .kcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px;position:relative;overflow:hidden}
  .kcard::before{content:"";position:absolute;top:0;left:0;width:100%;height:3px;background:var(--steel)}
  .kcard.k-mora::before{background:var(--red)} .kcard.k-cob::before{background:var(--green)} .kcard.k-cli::before{background:var(--gold)}
  .klab{font-size:.63em;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--slate)}
  .kval{font-size:1.55em;font-weight:700;margin-top:7px;color:var(--navy)}
  .kval.r{color:var(--red)} .kval.g{color:var(--green)}
  .kfoot{font-size:.65em;color:#9aabba;margin-top:3px}

  .sec-h{display:flex;align-items:center;gap:10px;margin:20px 2px 11px}
  .sec-h .ln{flex:1;height:1px;background:var(--line)}
  .sec-h .t{font-size:.67em;font-weight:600;text-transform:uppercase;letter-spacing:.11em;color:var(--slate)}

  .rangos{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
  .rg{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 4px;text-align:center}
  .rg .n{font-size:1.28em;font-weight:700;color:var(--navy)}
  .rg.warn .n{color:var(--amber)} .rg.bad .n{color:var(--red)}
  .rg .l{font-size:.55em;font-weight:600;color:var(--slate);margin-top:3px;letter-spacing:.03em}

  .ej{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 14px;margin-bottom:8px}
  .ej .nm{display:flex;align-items:center;gap:10px;font-size:.88em;font-weight:500}
  .ej .av{width:30px;height:30px;border-radius:8px;background:#E8EFF6;color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.74em}
  .ej .vv{font-weight:700;color:var(--red)}

  /* inputs/filtros */
  input.f,select.f{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:.9em;background:#fff;margin-bottom:8px;font-family:inherit;color:var(--ink2)}
  input.f:focus,select.f:focus{outline:none;border-color:var(--steel)}
  .filtros{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .resumen{font-size:.74em;color:var(--slate);font-weight:600;margin:4px 2px 12px}

  /* cliente cards */
  .cli{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
  .cli:active{transform:scale(.995)}
  .cli.mora{border-left:3px solid var(--red)}
  .cli .nm{font-weight:600;font-size:.9em}
  .cli .mt{font-size:.69em;color:var(--slate);margin-top:3px}
  .cli .sal{font-weight:700;color:var(--navy);text-align:right;white-space:nowrap}
  .cli .sal.r{color:var(--red)}
  .pill{font-size:.57em;font-weight:600;padding:3px 8px;border-radius:20px;letter-spacing:.03em;display:inline-block;margin-top:4px}
  .pill.ok{background:#E7F3EC;color:var(--green)} .pill.mora{background:#FBEAE7;color:var(--red)} .pill.liq{background:#EAEFF4;color:var(--slate)} .pill.dias{background:#FBEAE7;color:var(--red)}
  .pill.b{background:#E8EFF6;color:var(--navy)} .pill.y{background:#FAF1DA;color:var(--amber)} .pill.g{background:#E7F3EC;color:var(--green)}

  .loader{text-align:center;padding:34px;color:var(--slate);font-weight:500;font-size:.85em}

  /* menú Más */
  .menugrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .menubtn{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 12px;text-align:center;cursor:pointer;font-family:inherit;color:var(--ink2)}
  .menubtn:active{transform:scale(.98)}
  .menubtn .mi{width:38px;height:38px;border-radius:10px;background:#EEF3F8;color:var(--navy);display:flex;align-items:center;justify-content:center;margin:0 auto 9px}
  .menubtn .ml{font-weight:600;font-size:.82em}
  .menubtn .md{font-size:.63em;color:var(--slate);margin-top:2px}

  /* overlays */
  .overlay{position:fixed;inset:0;background:var(--bg);z-index:30;display:none;overflow-y:auto;padding-bottom:30px}
  .ohead{background:linear-gradient(180deg,var(--ink),var(--navy));color:#fff;padding:15px 16px;position:sticky;top:0;display:flex;align-items:center;gap:12px;z-index:2}
  .ohead .back{background:rgba(255,255,255,.14);border:none;color:#fff;width:34px;height:34px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .ohead .ot{font-weight:600;font-size:.98em}

  .fcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:11px}
  .fcard .fn{font-weight:700;font-size:1.08em}
  .fcard .fm{font-size:.72em;color:var(--slate);margin-top:3px}
  .ftrip{display:flex;justify-content:space-between;margin-top:13px;padding-top:12px;border-top:1px solid var(--line)}
  .ftrip .c{text-align:center;flex:1}
  .ftrip .c .l{font-size:.6em;color:var(--slate);font-weight:600;letter-spacing:.05em}
  .ftrip .c .v{font-weight:700;margin-top:2px}
  .cnt3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:11px}
  .cnt{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 4px;text-align:center}
  .cnt .n{font-size:1.2em;font-weight:700} .cnt .l{font-size:.55em;color:var(--slate);font-weight:600;margin-top:2px;letter-spacing:.04em}
  .pago{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--line);font-size:.82em}
  .pago:last-child{border-bottom:none}
  .pago .izq{display:flex;align-items:center;gap:10px}.pago .np{font-weight:600;color:#9aabba;min-width:26px}
  .chip{font-size:.55em;font-weight:600;padding:2px 7px;border-radius:5px}
  .chip.pag{background:#E7F3EC;color:var(--green)} .chip.ven{background:#FBEAE7;color:var(--red)} .chip.pen{background:#EAEFF4;color:var(--slate)}
  .coment{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:8px}
  .coment .ch{display:flex;justify-content:space-between;font-size:.64em;color:var(--slate);font-weight:600;margin-bottom:4px}
  .coment .ct{font-size:.84em}

  /* NAV */
  .nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:20}
  .nav button{flex:1;background:none;border:none;padding:10px 0 12px;cursor:pointer;color:#9aabba;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:inherit;position:relative}
  .nav button .lb{font-size:.61em;font-weight:600;letter-spacing:.02em}
  .nav button.on{color:var(--navy)}
  .nav button.on .dot{position:absolute;top:5px;width:4px;height:4px;border-radius:50%;background:var(--gold)}
  svg{display:block}
</style>
</head>
<body>
  <div id="login">
    <div class="loginbox">
      <div class="lmark">M</div>
      <div class="logo">MONEY<b>CASH</b></div>
      <div class="logosub">Sistema de cartera</div>
      <label>Correo</label><input type="email" id="email" autocomplete="username">
      <label>Contraseña</label><input type="password" id="pass" autocomplete="current-password" onkeydown="if(event.key==='Enter')entrar()">
      <button onclick="entrar()" id="btnEntrar">Entrar</button>
      <div class="loginerr" id="loginerr"></div>
    </div>
  </div>

  <div id="app">
    <div class="hdr">
      <div class="top">
        <div class="brand"><div class="mark">M</div><div class="wm">MONEY<b>CASH</b></div></div>
        <div class="hicons">
          <button class="hbtn" onclick="recargar()"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v4h-4"/></svg></button>
          <button class="hbtn" onclick="salir()"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg></button>
        </div>
      </div>
      <div class="hello"><div><div class="g" id="saludo">Hola</div><div class="sub" id="quien">MoneyCash</div></div></div>
    </div>

    <div class="wrap">
      <div id="vista_inicio"></div>
      <div id="vista_cartera" style="display:none"></div>
      <div id="vista_cobranza" style="display:none"></div>
      <div id="vista_mas" style="display:none"></div>
    </div>

    <div class="nav">
      <button id="nav_inicio" class="on" onclick="ir('inicio',this)"><span class="dot"></span><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="11" width="7" height="10" rx="1.5"/><rect x="3" y="15" width="7" height="6" rx="1.5"/></svg><span class="lb">Inicio</span></button>
      <button id="nav_cartera" onclick="ir('cartera',this)"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span class="lb">Cartera</span></button>
      <button id="nav_cobranza" onclick="ir('cobranza',this)"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 17l5-5 4 3 7-8"/><path d="M16 4h5v5"/></svg><span class="lb">Cobranza</span></button>
      <button id="nav_mas" onclick="ir('mas',this)"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg><span class="lb">Más</span></button>
    </div>
  </div>

  <div id="ficha" class="overlay">
    <div class="ohead"><button class="back" onclick="cerrar('ficha')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button><div class="ot" id="fnom">Cliente</div></div>
    <div class="wrap" id="fbody"><div class="loader">Cargando…</div></div>
  </div>
  <div id="seccion" class="overlay">
    <div class="ohead"><button class="back" onclick="cerrar('seccion')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button><div class="ot" id="snom">Sección</div></div>
    <div class="wrap" id="sbody"><div class="loader">Cargando…</div></div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL='https://qlobqnzgdojghypbdeks.supabase.co';
  const SUPABASE_KEY='sb_publishable_YIFdSES9rZJuc8Z70X5riA_Oe9pdXlP';
  const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  let CARTERA=[], MORA=[], CALByCli={}, COBRADO_MES=0, CACHE={}, FICHA_CLIENTE='';
  const GRACIA=3;
  const f=n=>'$'+Number(n||0).toLocaleString('es-MX',{maximumFractionDigits:0});
  const norm=s=>(s||'').toString().trim().toUpperCase();
  const esc=s=>(s||'').toString().replace(/'/g,"\\'").replace(/"/g,'&quot;');
  const ini2=s=>{const p=(s||'').trim().split(/\s+/);return ((p[0]||'')[0]||'')+((p[1]||'')[0]||'');};

  async function init(){ const {data:{session}}=await db.auth.getSession(); session?mostrarApp(session):mostrarLogin(); }
  function mostrarLogin(){ document.getElementById('login').style.display='flex'; document.getElementById('app').style.display='none'; }
  async function mostrarApp(s){
    document.getElementById('login').style.display='none'; document.getElementById('app').style.display='block';
    const h=new Date().getHours(); const sal=h<12?'Buenos días':h<19?'Buenas tardes':'Buenas noches';
    document.getElementById('saludo').textContent=sal;
    document.getElementById('quien').textContent=(s.user.email||'')+' · Panel general';
    await cargarTodo();
  }
  async function entrar(){
    const email=document.getElementById('email').value.trim(), pass=document.getElementById('pass').value;
    const eb=document.getElementById('loginerr'), btn=document.getElementById('btnEntrar'); eb.style.display='none';
    if(!email||!pass){eb.textContent='Pon tu correo y contraseña.';eb.style.display='block';return;}
    btn.textContent='Entrando…';btn.disabled=true;
    const {data,error}=await db.auth.signInWithPassword({email,password:pass});
    btn.textContent='Entrar';btn.disabled=false;
    if(error){eb.textContent='Correo o contraseña incorrectos.';eb.style.display='block';return;}
    document.getElementById('pass').value=''; mostrarApp(data.session);
  }
  async function salir(){ await db.auth.signOut(); CARTERA=[];MORA=[];CACHE={};CALByCli={}; mostrarLogin(); }

  async function cargarTodo(){
    document.getElementById('vista_inicio').innerHTML='<div class="loader">Cargando…</div>';
    CACHE={};
    const r1=await db.from('cartera').select('*').order('saldo',{ascending:false}); CARTERA=r1.data||[];
    // todo el calendario una vez
    let cal=[], desde=0, pag=1000;
    for(let i=0;i<5;i++){ const r=await db.from('calendarios').select('id,cliente,n_pago,fecha,monto_puntual,monto_impuntual,pagado,estatus,capital,interes').range(desde,desde+pag-1); const d=r.data||[]; cal=cal.concat(d); if(d.length<pag)break; desde+=pag; }
    CALByCli={}; cal.forEach(p=>{ const k=norm(p.cliente); (CALByCli[k]=CALByCli[k]||[]).push(p); });
    const hoy=new Date(); hoy.setHours(0,0,0,0); const hoyMs=hoy.getTime();
    const lim=new Date(hoyMs-GRACIA*86400000).getTime();
    const ejecDe={}; CARTERA.forEach(c=>ejecDe[norm(c.nombre)]=c.ejecutivo||'—');
    const acc={};
    Object.keys(CALByCli).forEach(k=>{
      CALByCli[k].forEach(p=>{
        if(norm(p.estatus).indexOf('PAGADO')>=0)return;
        const ft=new Date(p.fecha).getTime(); if(!(ft<lim))return;
        const falta=Math.max((Number(p.monto_puntual)||0)-(Number(p.pagado)||0),0);
        if(falta<=0)return;
        if(!acc[k])acc[k]={cliente:p.cliente,ejecutivo:ejecDe[k]||'—',mora:0,dias:0};
        acc[k].mora+=falta;
        const dias=Math.floor((hoyMs-ft)/86400000); if(dias>acc[k].dias)acc[k].dias=dias;
      });
    });
    MORA=Object.values(acc).filter(m=>m.mora>0).sort((a,b)=>b.mora-a.mora);
    const im=new Date(hoy.getFullYear(),hoy.getMonth(),1).toISOString().slice(0,10);
    const r3=await db.from('desglose').select('pago,fecha').gte('fecha',im);
    COBRADO_MES=(r3.data||[]).reduce((s,d)=>s+Number(d.pago||0),0);
    pintarInicio(); pintarCartera(); pintarCobranza();
  }
  function recargar(){ cargarTodo(); }

  function ir(v,btn){
    ['inicio','cartera','cobranza','mas'].forEach(x=>document.getElementById('vista_'+x).style.display=(x===v?'block':'none'));
    document.querySelectorAll('.nav button').forEach(b=>{b.className='';const d=b.querySelector('.dot');if(d)d.remove();});
    btn.className='on'; const dot=document.createElement('span'); dot.className='dot'; btn.prepend(dot);
    if(v==='mas')pintarMas();
  }

  function pintarInicio(){
    const totCart=CARTERA.reduce((s,c)=>s+Number(c.saldo||0),0);
    const conSaldo=CARTERA.filter(c=>Number(c.saldo||0)>0).length;
    const totMora=MORA.reduce((s,m)=>s+m.mora,0);
    const pct=totCart>0?((totMora/totCart)*100).toFixed(1):0;
    const porEj={}; MORA.forEach(m=>porEj[m.ejecutivo]=(porEj[m.ejecutivo]||0)+m.mora);
    const ejs=Object.entries(porEj).sort((a,b)=>b[1]-a[1]);
    const r=[0,0,0,0]; MORA.forEach(m=>{ if(m.dias<=7)r[0]++; else if(m.dias<=15)r[1]++; else if(m.dias<=30)r[2]++; else r[3]++; });
    const now=new Date(); const mesTxt=now.toLocaleDateString('es-MX',{month:'long',year:'numeric'});
    document.getElementById('vista_inicio').innerHTML=
      '<div class="kbig">'+
        '<div class="kcard"><div class="klab">Cartera total</div><div class="kval num">'+f(totCart)+'</div><div class="kfoot">saldo vivo · '+conSaldo+' activos</div></div>'+
        '<div class="kcard k-mora"><div class="klab">Mora total</div><div class="kval r num">'+f(totMora)+'</div><div class="kfoot">'+pct+'% de la cartera</div></div>'+
        '<div class="kcard k-cob"><div class="klab">Cobrado del mes</div><div class="kval g num">'+f(COBRADO_MES)+'</div><div class="kfoot">'+mesTxt+'</div></div>'+
        '<div class="kcard k-cli"><div class="klab">Clientes en mora</div><div class="kval num">'+MORA.length+'</div><div class="kfoot">de '+conSaldo+' activos</div></div>'+
      '</div>'+
      '<div class="sec-h"><span class="t">Mora por días vencidos</span><span class="ln"></span></div>'+
      '<div class="rangos">'+
        '<div class="rg"><div class="n num">'+r[0]+'</div><div class="l">1–7 DÍAS</div></div>'+
        '<div class="rg warn"><div class="n num">'+r[1]+'</div><div class="l">8–15 DÍAS</div></div>'+

  // ── ESCRIBIR: registrar abono (versión de prueba) ──
  async function registrarAbono(){
    const c=CARTERA.find(x=>norm(x.nombre)===norm(FICHA_CLIENTE)); if(!c){ alert('Cliente no encontrado.'); return; }
    const txt=prompt('Monto del abono para '+FICHA_CLIENTE+':');
    if(txt===null) return;
    let monto=parseFloat(String(txt).replace(/[^0-9.]/g,''));
    if(!monto||monto<=0){ alert('Monto inválido.'); return; }
    if(!confirm('¿Registrar abono de '+f(monto)+' a '+FICHA_CLIENTE+'?\\n\\n(Esto baja su saldo y marca pagos en el calendario.)')) return;

    // 1) aplicar a los pagos pendientes más viejos
    const cal=(CALByCli[norm(FICHA_CLIENTE)]||[]).slice().sort((a,b)=>(a.n_pago||0)-(b.n_pago||0));
    let resto=monto; const updates=[];
    for(const p of cal){
      if(resto<=0) break;
      if(norm(p.estatus).indexOf('PAGADO')>=0) continue;
      const necesita=Math.max((Number(p.monto_puntual)||0)-(Number(p.pagado)||0),0);
      if(necesita<=0) continue;
      const aplica=Math.min(resto, necesita);
      const nuevoPagado=(Number(p.pagado)||0)+aplica;
      const nuevoEstatus = nuevoPagado>=(Number(p.monto_puntual)||0) ? 'PAGADO' : (p.estatus||'PENDIENTE');
      updates.push({id:p.id, pagado:nuevoPagado, estatus:nuevoEstatus});
      resto-=aplica;
    }
    // 2) guardar cambios en calendario
    for(const u of updates){
      const {error}=await db.from('calendarios').update({pagado:u.pagado, estatus:u.estatus}).eq('id',u.id);
      if(error){ alert('Error al marcar pago: '+error.message); return; }
    }
    // 3) bajar saldo del cliente
    const nuevoSaldo=Math.max((Number(c.saldo)||0)-monto, 0);
    const {error:e2}=await db.from('cartera').update({saldo:nuevoSaldo}).eq('id',c.id);
    if(e2){ alert('Error al actualizar saldo: '+e2.message); return; }
    // 4) registrar en desglose (reparto simple 60/40 capital/interés)
    const hoy=new Date().toISOString().slice(0,10);
    await db.from('desglose').insert({fecha:hoy,cliente:FICHA_CLIENTE,ejecutivo:c.ejecutivo||'',pago:monto,capital:Math.round(monto*0.6),interes:Math.round(monto*0.4),tipo:'ABONO',banco:''});

    alert('✅ Abono de '+f(monto)+' registrado.');
    await cargarTodo();          // recalcula todo (saldos, mora, cobrado)
    abrirFicha(FICHA_CLIENTE);    // reabre la ficha actualizada
  }

  init();
</script>
